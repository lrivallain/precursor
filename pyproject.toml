[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precursor"
version = "0.1.0"
description = "Per-topic AI chat interface for work follow-up, where each topic maps to a GitHub issue."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "Precursor contributors" }]
keywords = ["chat", "github", "copilot", "mcp", "fastapi"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy[asyncio]>=2.0.36",
    "aiosqlite>=0.20",
    "alembic>=1.14",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sse-starlette>=2.1",
    "httpx>=0.27",
    "openai>=1.54",
    "mcp>=1.0",
    "python-multipart>=0.0.12",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.30"]
dev = [
    "ruff>=0.7",
    "mypy>=1.13",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.27",
]

[project.scripts]
precursor = "precursor.backend.__main__:main"

# Plugin discovery — third-party packages register entry points under this group.
# A plugin module must expose a `register(registry)` callable.
[project.entry-points."precursor.plugins"]
# example_plugin = "my_pkg.precursor_plugin:register"

[project.urls]
Homepage = "https://github.com/your-org/precursor"
Issues = "https://github.com/your-org/precursor/issues"

[tool.hatch.build.targets.wheel]
packages = ["precursor"]

[tool.hatch.build.targets.wheel.shared-data]
"frontend/dist" = "precursor/frontend_dist"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
exclude = ["frontend/", "precursor/backend/alembic/versions/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
