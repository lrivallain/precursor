name: Release

# Publish a release when a CalVer tag is pushed, e.g. `v2026.6.0`.
# The version is derived from the tag by hatch-vcs at build time.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build wheel + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so hatch-vcs resolves the exact tagged version.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (bundled into the wheel)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build wheel + sdist
        run: uv build

      - name: Verify built version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          built=$(ls dist/precursor-*.whl | sed -E 's#.*/precursor-([^-]+)-.*#\1#')
          echo "tag=$tag built=$built"
          # Normalise PEP 440 (CalVer maps 1:1, so they should match exactly).
          if [ "$tag" != "$built" ]; then
            echo "::error::Tag ($tag) does not match built version ($built)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Auto-generate notes from merged PRs / conventional commits since the
          # previous tag.
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
